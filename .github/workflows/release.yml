name: Release Plasma Wallpaper Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo add-apt-repository -y ppa:kubuntu-ppa/backports
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            debhelper \
            extra-cmake-modules \
            gettext \
            libkf6i18n-dev \
            libkf6package-dev \
            plasma-workspace-dev

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/plasma-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/plasma-v}"
          else
            VERSION=$(python3 -c "import json; print(json.load(open('package/metadata.json'))['KPlugin']['Version'])")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build deb
        run: ./build-deb.sh

      - name: Upload deb to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Plasma Wallpaper Plugin ${{ steps.version.outputs.version }}
          files: dist/kabegame-plasma-wallpaper_*_amd64.deb
          generate_release_notes: true
